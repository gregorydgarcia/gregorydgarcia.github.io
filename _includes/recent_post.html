<div class="post">

<header class="post-header">
	<h1 class="post-title">{{ page.title }}</h1>
	<p class="post-meta">{% if page.author %} • {{ page.author }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
</header>

<div class="post-content">
	{{ content }}
	{{ page.date | date: "%b %-d, %Y" }}</div>
</div>
